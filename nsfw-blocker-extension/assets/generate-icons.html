<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const sizes = [16, 48, 128];
    
    sizes.forEach(size => {
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, size, size);
      
      // Shield shape
      ctx.fillStyle = '#4CAF50';
      const padding = size * 0.15;
      const shieldWidth = size - padding * 2;
      const shieldHeight = size - padding * 2;
      
      ctx.beginPath();
      ctx.moveTo(padding + shieldWidth/2, padding);
      ctx.lineTo(padding + shieldWidth, padding);
      ctx.lineTo(padding + shieldWidth, padding + shieldHeight * 0.7);
      ctx.lineTo(padding + shieldWidth/2, padding + shieldHeight);
      ctx.lineTo(padding, padding + shieldHeight * 0.7);
      ctx.lineTo(padding, padding);
      ctx.closePath();
      ctx.fill();
      
      // Download
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
  </script>
</body>
</html>
